<?xml version="1.0" encoding="UTF-8"?>
<!--
  GOGA logomark — favicon + PWA icon source.
  Geometric "G" rendered as stroked arc + crossbar. Pure paths,
  no font dependency. 1024×1024 viewbox so it rasterises sharply
  at every favicon / app-icon size.
-->
<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 1024 1024"
  role="img"
  aria-label="GOGA"
>
  <!-- Rounded-square background tile (matches iOS / Android masking). -->
  <rect width="1024" height="1024" rx="200" ry="200" fill="#0a0a0a"/>

  <g
    fill="none"
    stroke="#fafafa"
    stroke-width="92"
    stroke-linecap="butt"
  >
    <!-- The G's open ring: an arc from 30° up over the top, around the
         left, around the bottom, terminating at 75° below the horizontal
         right (about 4 o'clock). Mouth opens to the right. -->
    <path d="
      M 766 304
      A 320 320 0 1 0 766 720
    "/>

    <!-- Inner crossbar that defines the G's signature horizontal tongue.
         Sits at the vertical centre, runs from the inner-right edge of
         the ring inward by ~150 units. -->
    <path d="M 766 512 L 580 512"/>
  </g>
</svg>
