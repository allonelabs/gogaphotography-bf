<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1000" preserveAspectRatio="xMidYMid slice">
  <rect width="800" height="1000" fill="#0000FF"/>

  <text x="60" y="80" font-family="Inter,sans-serif" font-size="12" font-weight="600" letter-spacing="3" fill="#FFFFFF" fill-opacity="0.7">04 — BRIDGES</text>
  <g transform="translate(740,76)">
    <text x="-18" y="4" text-anchor="end" font-family="Inter,sans-serif" font-size="12" font-weight="600" letter-spacing="3" fill="#FFFFFF" fill-opacity="0.7">8 KEYS · 1 LOCK</text>
    <circle r="4" fill="#FFFFFF">
      <animate attributeName="opacity" values="0.25;1;0.25" dur="1.6s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Headline -->
  <g transform="translate(60,150)">
    <text x="0" y="0" font-family="Inter,sans-serif" font-size="11" font-weight="600" letter-spacing="2.4" fill="#FFFFFF" fill-opacity="0.7">CONNECTED — RIGHT NOW</text>
    <text x="0" y="64" font-family="Inter,sans-serif" font-size="60" font-weight="700" fill="#FFFFFF" letter-spacing="-2.2">8 / 8 wired</text>
    <text x="0" y="92" font-family="Inter,sans-serif" font-size="12" font-weight="500" fill="#FFFFFF" fill-opacity="0.65">every tool you already pay for · 0 new logins required</text>
  </g>

  <!-- Hub centered at (400, 580) — content tightened so it fits within card crop -->
  <!-- Connection lines from satellites to hub -->
  <g stroke="#FFFFFF" stroke-opacity="0.45" stroke-width="1.2" fill="none">
    <path id="b1" d="M170 410 L 400 580"/>
    <path id="b2" d="M400 380 L 400 580"/>
    <path id="b3" d="M630 410 L 400 580"/>
    <path id="b4" d="M700 580 L 400 580"/>
    <path id="b5" d="M630 750 L 400 580"/>
    <path id="b6" d="M400 780 L 400 580"/>
    <path id="b7" d="M170 750 L 400 580"/>
    <path id="b8" d="M100 580 L 400 580"/>
  </g>

  <!-- Light pulses traveling INWARD -->
  <g fill="#FFFFFF">
    <circle r="4"><animateMotion dur="2.6s" repeatCount="indefinite"><mpath href="#b1"/></animateMotion></circle>
    <circle r="4"><animateMotion dur="2.6s" begin="0.3s" repeatCount="indefinite"><mpath href="#b2"/></animateMotion></circle>
    <circle r="4"><animateMotion dur="2.6s" begin="0.6s" repeatCount="indefinite"><mpath href="#b3"/></animateMotion></circle>
    <circle r="4"><animateMotion dur="2.6s" begin="0.9s" repeatCount="indefinite"><mpath href="#b4"/></animateMotion></circle>
    <circle r="4"><animateMotion dur="2.6s" begin="1.2s" repeatCount="indefinite"><mpath href="#b5"/></animateMotion></circle>
    <circle r="4"><animateMotion dur="2.6s" begin="1.5s" repeatCount="indefinite"><mpath href="#b6"/></animateMotion></circle>
    <circle r="4"><animateMotion dur="2.6s" begin="1.8s" repeatCount="indefinite"><mpath href="#b7"/></animateMotion></circle>
    <circle r="4"><animateMotion dur="2.6s" begin="2.1s" repeatCount="indefinite"><mpath href="#b8"/></animateMotion></circle>
  </g>

  <!-- Hub with three-bar mark + pulsing rings -->
  <g transform="translate(400,580)">
    <circle r="56" fill="none" stroke="#FFFFFF" stroke-opacity="0.6" stroke-width="1.5">
      <animate attributeName="r" values="56;76;56" dur="2.6s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.85;0;0.85" dur="2.6s" repeatCount="indefinite"/>
    </circle>
    <circle r="56" fill="none" stroke="#FFFFFF" stroke-opacity="0.6" stroke-width="1.5">
      <animate attributeName="r" values="56;76;56" dur="2.6s" begin="1.3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.85;0;0.85" dur="2.6s" begin="1.3s" repeatCount="indefinite"/>
    </circle>
    <circle r="40" fill="#FFFFFF"/>
    <g fill="#0000FF">
      <rect x="-14" y="-9" width="3.5" height="18"/>
      <rect x="-2"  y="-15" width="3.5" height="30"/>
      <rect x="10"  y="-7" width="3.5" height="14"/>
    </g>
  </g>

  <!-- Satellite tools — flat white pills -->
  <g font-family="Inter,sans-serif" font-size="13" font-weight="600" letter-spacing="-0.2">
    <g transform="translate(170,410)"><rect x="-50" y="-22" width="100" height="44" rx="0" fill="#FFFFFF"/><text text-anchor="middle" y="5" fill="#0E0E0E">Stripe</text></g>
    <g transform="translate(400,380)"><rect x="-50" y="-22" width="100" height="44" rx="0" fill="#FFFFFF"/><text text-anchor="middle" y="5" fill="#0E0E0E">Gmail</text></g>
    <g transform="translate(630,410)"><rect x="-50" y="-22" width="100" height="44" rx="0" fill="#FFFFFF"/><text text-anchor="middle" y="5" fill="#0E0E0E">Slack</text></g>
    <g transform="translate(700,580)"><rect x="-60" y="-22" width="120" height="44" rx="0" fill="#FFFFFF"/><text text-anchor="middle" y="5" fill="#0E0E0E">QuickBooks</text></g>
    <g transform="translate(630,750)"><rect x="-50" y="-22" width="100" height="44" rx="0" fill="#FFFFFF"/><text text-anchor="middle" y="5" fill="#0E0E0E">Notion</text></g>
    <g transform="translate(400,780)"><rect x="-50" y="-22" width="100" height="44" rx="0" fill="#FFFFFF"/><text text-anchor="middle" y="5" fill="#0E0E0E">Webflow</text></g>
    <g transform="translate(170,750)"><rect x="-50" y="-22" width="100" height="44" rx="0" fill="#FFFFFF"/><text text-anchor="middle" y="5" fill="#0E0E0E">Linear</text></g>
    <g transform="translate(100,580)"><rect x="-46" y="-22" width="92" height="44" rx="0" fill="#FFFFFF"/><text text-anchor="middle" y="5" fill="#0E0E0E">HubSpot</text></g>
  </g>

  <text x="60" y="940" font-family="Inter,sans-serif" font-size="20" font-weight="500" fill="#FFFFFF" fill-opacity="0.92" letter-spacing="-0.5">Bridges to every tool you already pay for.</text>
</svg>
