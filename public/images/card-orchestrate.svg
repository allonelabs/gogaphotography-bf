<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1000" preserveAspectRatio="xMidYMid slice">
  <rect width="800" height="1000" fill="#0000FF"/>

  <text x="60" y="80" font-family="Inter,sans-serif" font-size="12" font-weight="600" letter-spacing="3" fill="#FFFFFF" fill-opacity="0.7">02 — ORCHESTRATE</text>
  <g transform="translate(740,76)">
    <text x="-18" y="4" text-anchor="end" font-family="Inter,sans-serif" font-size="12" font-weight="600" letter-spacing="3" fill="#FFFFFF" fill-opacity="0.7">SIX TEAMS · ONE TEMPO</text>
    <circle r="4" fill="#FFFFFF">
      <animate attributeName="opacity" values="0.25;1;0.25" dur="1.6s" repeatCount="indefinite"/>
    </circle>
  </g>

  <g transform="translate(60,150)">
    <text x="0" y="0" font-family="Inter,sans-serif" font-size="11" font-weight="600" letter-spacing="2.4" fill="#FFFFFF" fill-opacity="0.7">CONDUCTING — THIS WEEK</text>
    <text x="0" y="64" font-family="Inter,sans-serif" font-size="60" font-weight="700" fill="#FFFFFF" letter-spacing="-2.2">236 tasks</text>
    <text x="0" y="92" font-family="Inter,sans-serif" font-size="12" font-weight="500" fill="#FFFFFF" fill-opacity="0.65">across six teams · 92% on cadence · 0 collisions</text>
  </g>

  <!-- Lane labels -->
  <g font-family="Inter,sans-serif" font-size="12" font-weight="600" fill="#FFFFFF" fill-opacity="0.85" letter-spacing="1.2">
    <text x="60" y="478">SALES</text>
    <text x="60" y="538">OPS</text>
    <text x="60" y="598">SUPPORT</text>
    <text x="60" y="658">MARKETING</text>
    <text x="60" y="718">FINANCE</text>
    <text x="60" y="778">PRODUCT</text>
  </g>

  <!-- Status dots -->
  <g>
    <circle cx="200" cy="473" r="4" fill="#FFFFFF"><animate attributeName="opacity" values="0.4;1;0.4" dur="1.8s" repeatCount="indefinite"/></circle>
    <circle cx="200" cy="533" r="4" fill="#FFFFFF"><animate attributeName="opacity" values="0.4;1;0.4" dur="1.8s" begin="0.3s" repeatCount="indefinite"/></circle>
    <circle cx="200" cy="593" r="4" fill="#FFFFFF"><animate attributeName="opacity" values="0.4;1;0.4" dur="1.8s" begin="0.6s" repeatCount="indefinite"/></circle>
    <circle cx="200" cy="653" r="4" fill="#FFFFFF"><animate attributeName="opacity" values="0.4;1;0.4" dur="1.8s" begin="0.9s" repeatCount="indefinite"/></circle>
    <circle cx="200" cy="713" r="4" fill="#FFFFFF"><animate attributeName="opacity" values="0.4;1;0.4" dur="1.8s" begin="1.2s" repeatCount="indefinite"/></circle>
    <circle cx="200" cy="773" r="4" fill="#FFFFFF"><animate attributeName="opacity" values="0.4;1;0.4" dur="1.8s" begin="1.5s" repeatCount="indefinite"/></circle>
  </g>

  <g stroke="#FFFFFF" stroke-opacity="0.20" stroke-width="1">
    <line x1="220" y1="473" x2="740" y2="473"/>
    <line x1="220" y1="533" x2="740" y2="533"/>
    <line x1="220" y1="593" x2="740" y2="593"/>
    <line x1="220" y1="653" x2="740" y2="653"/>
    <line x1="220" y1="713" x2="740" y2="713"/>
    <line x1="220" y1="773" x2="740" y2="773"/>
  </g>

  <!-- Task chips: DONE (white solid) · ACTIVE (white outline solid fill) · QUEUED (dashed outline) -->
  <g>
    <rect x="240" y="460" width="120" height="26" rx="0" fill="#FFFFFF" fill-opacity="0.85"/>
    <rect x="368" y="460" width="80"  height="26" rx="0" fill="#FFFFFF" fill-opacity="0.55"/>
    <rect x="456" y="460" width="100" height="26" rx="0" fill="none" stroke="#FFFFFF" stroke-opacity="0.45" stroke-dasharray="3 3"/>
    <rect x="564" y="460" width="80"  height="26" rx="0" fill="none" stroke="#FFFFFF" stroke-opacity="0.45" stroke-dasharray="3 3"/>

    <rect x="260" y="520" width="200" height="26" rx="0" fill="#FFFFFF" fill-opacity="0.85"/>
    <rect x="468" y="520" width="80"  height="26" rx="0" fill="#FFFFFF" fill-opacity="0.55"/>
    <rect x="556" y="520" width="120" height="26" rx="0" fill="none" stroke="#FFFFFF" stroke-opacity="0.45" stroke-dasharray="3 3"/>

    <rect x="290" y="580" width="90"  height="26" rx="0" fill="#FFFFFF" fill-opacity="0.85"/>
    <rect x="388" y="580" width="60"  height="26" rx="0" fill="#FFFFFF" fill-opacity="0.85"/>
    <rect x="456" y="580" width="160" height="26" rx="0" fill="#FFFFFF" fill-opacity="0.55"/>
    <rect x="624" y="580" width="60"  height="26" rx="0" fill="none" stroke="#FFFFFF" stroke-opacity="0.45" stroke-dasharray="3 3"/>

    <rect x="240" y="640" width="160" height="26" rx="0" fill="#FFFFFF" fill-opacity="0.85"/>
    <rect x="408" y="640" width="100" height="26" rx="0" fill="#FFFFFF" fill-opacity="0.55"/>
    <rect x="516" y="640" width="80"  height="26" rx="0" fill="none" stroke="#FFFFFF" stroke-opacity="0.45" stroke-dasharray="3 3"/>

    <rect x="280" y="700" width="240" height="26" rx="0" fill="#FFFFFF" fill-opacity="0.85"/>
    <rect x="528" y="700" width="120" height="26" rx="0" fill="#FFFFFF" fill-opacity="0.55"/>

    <rect x="240" y="760" width="120" height="26" rx="0" fill="#FFFFFF" fill-opacity="0.85"/>
    <rect x="368" y="760" width="60"  height="26" rx="0" fill="#FFFFFF" fill-opacity="0.85"/>
    <rect x="436" y="760" width="190" height="26" rx="0" fill="#FFFFFF" fill-opacity="0.55"/>
  </g>

  <!-- NOW playhead -->
  <g>
    <line x1="0" y1="450" x2="0" y2="800" stroke="#FFFFFF" stroke-width="1.5" stroke-opacity="0.85">
      <animate attributeName="x1" values="220;740;220" dur="6s" repeatCount="indefinite"
               calcMode="spline" keySplines="0.4 0 0.6 1; 0.4 0 0.6 1" keyTimes="0;0.5;1"/>
      <animate attributeName="x2" values="220;740;220" dur="6s" repeatCount="indefinite"
               calcMode="spline" keySplines="0.4 0 0.6 1; 0.4 0 0.6 1" keyTimes="0;0.5;1"/>
    </line>
    <circle cy="450" r="6" fill="#FFFFFF">
      <animate attributeName="cx" values="220;740;220" dur="6s" repeatCount="indefinite"
               calcMode="spline" keySplines="0.4 0 0.6 1; 0.4 0 0.6 1" keyTimes="0;0.5;1"/>
    </circle>
    <text y="436" font-family="Inter,sans-serif" font-size="11" font-weight="700" fill="#FFFFFF" letter-spacing="1.4">
      <animate attributeName="x" values="200;720;200" dur="6s" repeatCount="indefinite"
               calcMode="spline" keySplines="0.4 0 0.6 1; 0.4 0 0.6 1" keyTimes="0;0.5;1"/>
      NOW
    </text>
  </g>

  <!-- Legend -->
  <g font-family="Inter,sans-serif" font-size="10" font-weight="600" letter-spacing="1.2" fill="#FFFFFF" fill-opacity="0.7">
    <rect x="60"  y="824" width="14" height="10" fill="#FFFFFF" fill-opacity="0.85"/><text x="80"  y="833">DONE</text>
    <rect x="160" y="824" width="14" height="10" fill="#FFFFFF" fill-opacity="0.55"/><text x="180" y="833">ACTIVE</text>
    <rect x="270" y="824" width="14" height="10" fill="none" stroke="#FFFFFF" stroke-opacity="0.45" stroke-dasharray="3 3"/><text x="290" y="833">QUEUED</text>
  </g>

  <text x="60" y="940" font-family="Inter,sans-serif" font-size="20" font-weight="500" fill="#FFFFFF" fill-opacity="0.92" letter-spacing="-0.5">Six teams, one tempo. Conducted, not chased.</text>
</svg>
