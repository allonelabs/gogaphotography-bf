<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 482 482" width="482" height="482">
  <defs>
    <!-- One continuous clockwise full-circle path. Single textPath = no overlap. -->
    <path id="iA15-ringFull" d="M 241,40 a 201,201 0 1,1 -0.001,0" fill="none"/>

    <!-- Depth: electric-blue halo behind the centre, fading well before the rim -->
    <radialGradient id="iA15-depth" cx="50%" cy="50%" r="48%">
      <stop offset="0%"  stop-color="#0000FF" stop-opacity="0.28"/>
      <stop offset="38%" stop-color="#0000FF" stop-opacity="0.16"/>
      <stop offset="72%" stop-color="#0000FF" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#0000FF" stop-opacity="0"/>
    </radialGradient>
    <!-- Soft electric-blue inset near the rim -->
    <radialGradient id="iA15-inset" cx="50%" cy="50%" r="50%">
      <stop offset="60%" stop-color="#0000FF" stop-opacity="0"/>
      <stop offset="86%" stop-color="#0000FF" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#0000FF" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Depth layers behind everything -->
  <circle cx="241" cy="241" r="201" fill="url(#iA15-depth)"/>
  <circle cx="241" cy="241" r="201" fill="url(#iA15-inset)"/>

  <!-- Rotating ring: outer circle + ticks + ONE continuous text -->
  <g>
    <circle cx="241" cy="241" r="201" fill="none" stroke="#000" stroke-width="1"/>
    <g stroke="#000" stroke-width="1.4">
      <line x1="241" y1="40"  x2="241" y2="56"/>
      <line x1="241" y1="442" x2="241" y2="426"/>
      <line x1="40"  y1="241" x2="56"  y2="241"/>
      <line x1="442" y1="241" x2="426" y2="241"/>
    </g>
    <g stroke="#000" stroke-opacity="0.30" stroke-width="1">
      <line x1="241" y1="40" x2="241" y2="50" transform="rotate(30  241 241)"/>
      <line x1="241" y1="40" x2="241" y2="50" transform="rotate(60  241 241)"/>
      <line x1="241" y1="40" x2="241" y2="50" transform="rotate(120 241 241)"/>
      <line x1="241" y1="40" x2="241" y2="50" transform="rotate(150 241 241)"/>
      <line x1="241" y1="40" x2="241" y2="50" transform="rotate(210 241 241)"/>
      <line x1="241" y1="40" x2="241" y2="50" transform="rotate(240 241 241)"/>
      <line x1="241" y1="40" x2="241" y2="50" transform="rotate(300 241 241)"/>
      <line x1="241" y1="40" x2="241" y2="50" transform="rotate(330 241 241)"/>
    </g>

    <!-- Single full-circle wordmark, sized to wrap once around the rim -->
    <text font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600"
          letter-spacing="3" fill="#000">
      <textPath href="#iA15-ringFull" startOffset="0">RUN YOUR BUSINESS  ·  ALL AT ONCE  ·  ONE WINDOW  ·  ONE BACKEND  ·  ALLONE LABS  ·  EST 2025  ·  </textPath>
    </text>

    <animateTransform attributeName="transform" attributeType="XML" type="rotate"
                      from="0 241 241" to="360 241 241" dur="90s" repeatCount="indefinite"/>
  </g>

  <!-- STATIC inner ring + central mark + wordmark -->
  <circle cx="241" cy="241" r="170" fill="none" stroke="#000" stroke-opacity="0.10" stroke-width="1"/>

  <g transform="translate(241,241)">
    <g transform="translate(0,-50)">
      <rect x="-22" y="-14" width="6" height="28" fill="#000"/>
      <rect x="-3"  y="-22" width="6" height="44" fill="#000"/>
      <rect x="16"  y="-10" width="6" height="20" fill="#000"/>
    </g>
    <text y="22" text-anchor="middle" font-family="Inter, system-ui, sans-serif"
          font-size="42" font-weight="700" letter-spacing="-1.6" fill="#000">AllOnce<tspan
          font-size="14" baseline-shift="super" font-weight="500" letter-spacing="0" dx="2">©</tspan></text>
    <text y="46" text-anchor="middle" font-family="Inter, system-ui, sans-serif"
          font-size="9" font-weight="600" letter-spacing="2.2" fill="#000" fill-opacity="0.45">ONE BACKEND  ·  ONE WINDOW</text>
  </g>
</svg>
