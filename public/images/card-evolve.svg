<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1000" preserveAspectRatio="xMidYMid slice">
  <!-- Flat electric-blue ground -->
  <rect width="800" height="1000" fill="#0000FF"/>

  <!-- Header -->
  <text x="60" y="80" font-family="Inter,sans-serif" font-size="12" font-weight="600" letter-spacing="3" fill="#FFFFFF" fill-opacity="0.7">01 — EVOLVE</text>
  <g transform="translate(740,76)">
    <text x="-18" y="4" text-anchor="end" font-family="Inter,sans-serif" font-size="12" font-weight="600" letter-spacing="3" fill="#FFFFFF" fill-opacity="0.7">LIVE</text>
    <circle r="4" fill="#FFFFFF">
      <animate attributeName="opacity" values="0.25;1;0.25" dur="1.6s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Headline value -->
  <g transform="translate(60,150)">
    <text x="0" y="0" font-family="Inter,sans-serif" font-size="11" font-weight="600" letter-spacing="2.4" fill="#FFFFFF" fill-opacity="0.7">REVENUE — TRAILING 12 MO</text>
    <text x="0" y="64" font-family="Inter,sans-serif" font-size="60" font-weight="700" fill="#FFFFFF" letter-spacing="-2.2">$184,210</text>
    <g transform="translate(340,28)">
      <rect width="100" height="32" rx="0" fill="#FFFFFF" fill-opacity="0.18"/>
      <text x="50" y="22" text-anchor="middle" font-family="Inter,sans-serif" font-size="13" font-weight="600" fill="#FFFFFF">▲ 12.4%</text>
    </g>
    <text x="0" y="92" font-family="Inter,sans-serif" font-size="12" font-weight="500" fill="#FFFFFF" fill-opacity="0.65">vs $163,890 last year — 11 of 12 months up</text>
  </g>

  <!-- Y-axis ticks -->
  <g font-family="Inter,sans-serif" font-size="11" font-weight="500" fill="#FFFFFF" fill-opacity="0.5" letter-spacing="0.4">
    <text x="20" y="500">$200k</text>
    <text x="28" y="600">$150k</text>
    <text x="28" y="700">$100k</text>
    <text x="36" y="800">$50k</text>
    <text x="50" y="876">$0</text>
  </g>

  <!-- Grid -->
  <g stroke="#FFFFFF" stroke-opacity="0.16" stroke-width="1">
    <line x1="80" y1="500" x2="730" y2="500"/>
    <line x1="80" y1="600" x2="730" y2="600"/>
    <line x1="80" y1="700" x2="730" y2="700"/>
    <line x1="80" y1="800" x2="730" y2="800"/>
    <line x1="80" y1="876" x2="730" y2="876"/>
  </g>

  <!-- Bars (flat white, low opacity) — grow on -->
  <g fill="#FFFFFF" fill-opacity="0.30">
    <rect x="92"  y="876" width="44" height="0">
      <animate attributeName="y" to="856" dur="0.8s" begin="0.05s" fill="freeze" calcMode="spline" keySplines="0.2 0.8 0.2 1"/>
      <animate attributeName="height" to="20" dur="0.8s" begin="0.05s" fill="freeze" calcMode="spline" keySplines="0.2 0.8 0.2 1"/>
    </rect>
    <rect x="148" y="876" width="44" height="0">
      <animate attributeName="y" to="842" dur="0.8s" begin="0.10s" fill="freeze" calcMode="spline" keySplines="0.2 0.8 0.2 1"/>
      <animate attributeName="height" to="34" dur="0.8s" begin="0.10s" fill="freeze" calcMode="spline" keySplines="0.2 0.8 0.2 1"/>
    </rect>
    <rect x="204" y="876" width="44" height="0">
      <animate attributeName="y" to="820" dur="0.8s" begin="0.15s" fill="freeze" calcMode="spline" keySplines="0.2 0.8 0.2 1"/>
      <animate attributeName="height" to="56" dur="0.8s" begin="0.15s" fill="freeze" calcMode="spline" keySplines="0.2 0.8 0.2 1"/>
    </rect>
    <rect x="260" y="876" width="44" height="0">
      <animate attributeName="y" to="788" dur="0.8s" begin="0.20s" fill="freeze" calcMode="spline" keySplines="0.2 0.8 0.2 1"/>
      <animate attributeName="height" to="88" dur="0.8s" begin="0.20s" fill="freeze" calcMode="spline" keySplines="0.2 0.8 0.2 1"/>
    </rect>
    <rect x="316" y="876" width="44" height="0">
      <animate attributeName="y" to="756" dur="0.8s" begin="0.25s" fill="freeze" calcMode="spline" keySplines="0.2 0.8 0.2 1"/>
      <animate attributeName="height" to="120" dur="0.8s" begin="0.25s" fill="freeze" calcMode="spline" keySplines="0.2 0.8 0.2 1"/>
    </rect>
    <rect x="372" y="876" width="44" height="0">
      <animate attributeName="y" to="706" dur="0.8s" begin="0.30s" fill="freeze" calcMode="spline" keySplines="0.2 0.8 0.2 1"/>
      <animate attributeName="height" to="170" dur="0.8s" begin="0.30s" fill="freeze" calcMode="spline" keySplines="0.2 0.8 0.2 1"/>
    </rect>
    <rect x="428" y="876" width="44" height="0">
      <animate attributeName="y" to="666" dur="0.8s" begin="0.35s" fill="freeze" calcMode="spline" keySplines="0.2 0.8 0.2 1"/>
      <animate attributeName="height" to="210" dur="0.8s" begin="0.35s" fill="freeze" calcMode="spline" keySplines="0.2 0.8 0.2 1"/>
    </rect>
    <rect x="484" y="876" width="44" height="0">
      <animate attributeName="y" to="620" dur="0.8s" begin="0.40s" fill="freeze" calcMode="spline" keySplines="0.2 0.8 0.2 1"/>
      <animate attributeName="height" to="256" dur="0.8s" begin="0.40s" fill="freeze" calcMode="spline" keySplines="0.2 0.8 0.2 1"/>
    </rect>
    <rect x="540" y="876" width="44" height="0">
      <animate attributeName="y" to="584" dur="0.8s" begin="0.45s" fill="freeze" calcMode="spline" keySplines="0.2 0.8 0.2 1"/>
      <animate attributeName="height" to="292" dur="0.8s" begin="0.45s" fill="freeze" calcMode="spline" keySplines="0.2 0.8 0.2 1"/>
    </rect>
    <rect x="596" y="876" width="44" height="0">
      <animate attributeName="y" to="540" dur="0.8s" begin="0.50s" fill="freeze" calcMode="spline" keySplines="0.2 0.8 0.2 1"/>
      <animate attributeName="height" to="336" dur="0.8s" begin="0.50s" fill="freeze" calcMode="spline" keySplines="0.2 0.8 0.2 1"/>
    </rect>
    <rect x="652" y="876" width="44" height="0">
      <animate attributeName="y" to="500" dur="0.8s" begin="0.55s" fill="freeze" calcMode="spline" keySplines="0.2 0.8 0.2 1"/>
      <animate attributeName="height" to="376" dur="0.8s" begin="0.55s" fill="freeze" calcMode="spline" keySplines="0.2 0.8 0.2 1"/>
    </rect>
  </g>

  <!-- Last-year baseline (dashed) -->
  <path d="M80 870 C 200 868, 320 850, 420 820 S 580 760, 730 720"
        stroke="#FFFFFF" stroke-opacity="0.30" stroke-width="1.5" fill="none" stroke-dasharray="3 5"/>

  <!-- Main curve — draws on -->
  <path id="ev-curve"
        d="M114 866 L 170 842 L 226 820 L 282 788 L 338 756 L 394 706 L 450 666 L 506 620 L 562 584 L 618 540 L 674 500"
        stroke="#FFFFFF" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"
        stroke-dasharray="1500" stroke-dashoffset="1500">
    <animate attributeName="stroke-dashoffset" from="1500" to="0" dur="1.4s" begin="0.4s" fill="freeze"
             calcMode="spline" keySplines="0.4 0 0.2 1"/>
  </path>

  <!-- Latest point — flat ring -->
  <circle cx="674" cy="500" r="6" fill="#FFFFFF" opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="1.7s" dur="0.3s" fill="freeze"/>
  </circle>
  <circle cx="674" cy="500" r="6" fill="none" stroke="#FFFFFF" stroke-width="2" opacity="0">
    <animate attributeName="opacity" from="0" to="0.85" begin="1.7s" dur="0.3s" fill="freeze"/>
    <animate attributeName="r" values="6;28;6" dur="2.4s" begin="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.9;0;0.9" dur="2.4s" begin="2s" repeatCount="indefinite"/>
  </circle>

  <!-- Latest-value chip -->
  <g transform="translate(490,420)" opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="1.8s" dur="0.4s" fill="freeze"/>
    <rect width="200" height="48" rx="0" fill="#FFFFFF"/>
    <text x="14" y="20" font-family="Inter,sans-serif" font-size="10" font-weight="600" fill="#0000FF" letter-spacing="1.6">REVENUE — NOV</text>
    <text x="14" y="40" font-family="Inter,sans-serif" font-size="18" font-weight="700" fill="#0E0E0E" letter-spacing="-0.6">$22,410
      <tspan font-size="12" fill="#0000FF" dx="6" font-weight="600">▲ 12.4%</tspan>
    </text>
  </g>

  <!-- Months axis -->
  <g font-family="Inter,sans-serif" font-size="11" font-weight="500" fill="#FFFFFF" fill-opacity="0.55" letter-spacing="0.4">
    <text x="76"  y="900">JAN</text>
    <text x="186" y="900">MAR</text>
    <text x="298" y="900">MAY</text>
    <text x="416" y="900">JUL</text>
    <text x="528" y="900">SEP</text>
    <text x="650" y="900">NOV</text>
  </g>

  <!-- Caption -->
  <text x="60" y="940" font-family="Inter,sans-serif" font-size="20" font-weight="500" fill="#FFFFFF" fill-opacity="0.92" letter-spacing="-0.5">Your stack adapts. Your business compounds.</text>
</svg>
